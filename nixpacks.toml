# Railway/Nixpacks config for this monorepo.
# Works whether the build starts at repo root or already in apps/web.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["if [ -d apps/web ]; then cd apps/web; fi && npm ci"]

[phases.build]
cmds = ["if [ -d apps/web ]; then cd apps/web; fi && npm run build"]

[start]
cmd = "if [ -d apps/web ]; then cd apps/web; fi && npm run start"
