<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or "TradePi Global" }}</title>
    <link rel="stylesheet" href="/static/site.css" />
  </head>
  <body>
    <header>
      <div class="container nav">
        <a href="/" class="brand">TradePi Global</a>
        <nav>
          <a href="/" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
          <a href="/packages" class="{% if active_page == 'packages' %}active{% endif %}">Packages</a>
          <a href="/brief" class="{% if active_page == 'brief' %}active{% endif %}">Brief Intake</a>
          <a href="/contact" rel="noreferrer">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
