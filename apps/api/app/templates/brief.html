{% extends "base.html" %}
{% block content %}
<section class="hero">
  <p class="eyebrow">Brief</p>
  <h1>Create a real campaign brief for AdGenius</h1>
</section>
{% if submitted %}<section class="card success"><h2>Brief saved.</h2></section>{% endif %}
<form class="card" method="post" action="/brief">
  <label>Business name *<input type="text" name="business_name" required /></label>
  <label>Sector *<input type="text" name="sector" required /></label>
  <label>Offer summary *<textarea rows="3" name="offer_summary" required></textarea></label>
  <label>Target audience *<textarea rows="3" name="target_audience" required></textarea></label>
  <label>Goal *<textarea rows="3" name="goal" required></textarea></label>
  <label>Competitor examples<textarea rows="2" name="competitor_examples"></textarea></label>
  <label>Tone / notes<textarea rows="2" name="tone_notes"></textarea></label>
  <label>Selected package *<input type="text" name="selected_package" required /></label>
  <button type="submit" class="button">Create brief</button>
</form>
<h2>Recent Briefs</h2>
<ul>{% for b in briefs %}<li><a href="/dashboard/briefs/{{ b.id }}">{{ b.business_name }}</a> - {{ b.status.value }}</li>{% endfor %}</ul>
{% endblock %}
