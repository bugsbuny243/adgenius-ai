name: Generate Google Play Keystore
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.KOSCHEI_KEYSTORE_PASS }}"
          test -n "${{ secrets.KOSCHEI_KEY_ALIAS }}"

      - name: Create Keystore
        run: |
          keytool -genkey -v -keystore koschei.keystore \
          -alias "${{ secrets.KOSCHEI_KEY_ALIAS }}" -keyalg RSA -keysize 2048 \
          -validity 10000 \
          -storepass "${{ secrets.KOSCHEI_KEYSTORE_PASS }}" -keypass "${{ secrets.KOSCHEI_KEYSTORE_PASS }}" \
          -dname "CN=Koschei, OU=Dev, O=KoscheiAI, L=Istanbul, S=Istanbul, C=TR"

      - name: Upload Keystore as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-keystore
          path: koschei.keystore
